<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>斗士殿堂 — 街霸6 全角色档案</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@300;400;500;700;900&family=Oswald:wght@400;600;700&display=block" rel="stylesheet">
<style>
/* ===== 自定义属性 ===== */
:root {
  --red: #E63946;
  --red-dark: #B71C1C;
  --yellow: #F4A261;
  --neon-blue: #00B4D8;
  --neon-cyan: #00E5FF;
  --bg-dark: #0A0A0A;
  --bg-card: #121212;
  --bg-card-hover: #1A1A1A;
  --text-primary: #F1FAEE;
  --text-secondary: #A0A0A0;
  --text-dim: #666;
  --border-color: #2A2A2A;
  --font-title: 'Bebas Neue', cursive;
  --font-sub: 'Oswald', sans-serif;
  --font-body: 'Noto Sans SC', sans-serif;
  --grid-gap: 8px;
  --card-radius: 4px;
}

/* ===== 重置 ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg-dark);
  color: var(--text-primary);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
}

/* ===== 英雄区 ===== */
.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: radial-gradient(ellipse at 30% 50%, #1A0A0A 0%, var(--bg-dark) 70%);
}

/* 涂鸦背景装饰 */
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 80% 20%, rgba(230,57,70,0.15) 0%, transparent 50%),
    radial-gradient(circle at 20% 80%, rgba(0,180,216,0.1) 0%, transparent 50%),
    repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px);
  pointer-events: none;
}

.hero .splatter {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0.4;
}
.hero .splatter:nth-child(1) {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(230,57,70,0.3) 0%, transparent 70%);
  top: -50px; right: -80px;
  animation: floatSlow 8s ease-in-out infinite;
}
.hero .splatter:nth-child(2) {
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(244,162,97,0.2) 0%, transparent 70%);
  bottom: 10%; left: -40px;
  animation: floatSlow 6s ease-in-out infinite reverse;
}
.hero .splatter:nth-child(3) {
  width: 150px; height: 150px;
  background: radial-gradient(circle, rgba(0,180,216,0.15) 0%, transparent 70%);
  top: 40%; right: 15%;
  animation: floatSlow 10s ease-in-out infinite 2s;
}

@keyframes floatSlow {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(30px, -20px) scale(1.1); }
}

.hero .spray-stripe {
  position: absolute;
  height: 60px;
  width: 200%;
  left: -50%;
  pointer-events: none;
  opacity: 0.06;
}
.hero .spray-stripe:nth-child(4) {
  top: 25%;
  background: linear-gradient(90deg, transparent 0%, var(--red) 30%, transparent 60%);
  transform: rotate(-3deg);
}
.hero .spray-stripe:nth-child(5) {
  bottom: 30%;
  background: linear-gradient(90deg, transparent 40%, var(--neon-blue) 70%, transparent 100%);
  transform: rotate(2deg);
}

/* ===== 角色剪影容器 ===== */
.silhouette-container {
  position: absolute;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}
.silhouette {
  position: absolute;
  width: calc(var(--size) * 0.5px);
  height: calc(var(--size) * 1px);
  left: calc(var(--x) - var(--size) * 0.25px);
  top: calc(var(--y) - var(--size) * 0.5px);
  background-repeat: no-repeat;
  background-position: center bottom;
  background-size: contain;
  opacity: var(--opacity, 0.35);
  animation: silhouetteBreath var(--breath-dur, 7s) ease-in-out var(--breath-delay, 0s) infinite;
  will-change: transform, opacity, filter;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease, filter 0.5s ease;
  cursor: pointer;
  filter: brightness(0.4) sepia(0.35) saturate(0.5) contrast(1.2);
  -webkit-tap-highlight-color: transparent;
  outline: none;
  user-select: none;
  -webkit-user-select: none;
}
.silhouette:hover,
.silhouette.active {
  animation: none !important;
  transform: scale(1.1);
  opacity: 1 !important;
  z-index: 10;
  filter: brightness(1) sepia(0) saturate(1) contrast(1);
}

@keyframes silhouetteBreath {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.018); }
}

/* ===== 展厅氛围 ===== */
.hero-spotlight {
  position: absolute;
  top: -8%;
  left: 50%;
  transform: translateX(-50%);
  width: 70%;
  height: 45%;
  background: radial-gradient(ellipse at center top, rgba(255,255,255,0.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
.hero-vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
  pointer-events: none;
  z-index: 0;
}
.hero-floor {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 55%;
  background: linear-gradient(180deg, transparent 30%, rgba(180,150,80,0.03) 75%, rgba(180,150,80,0.06) 92%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}
.hero-floor::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(90deg, transparent 0px, transparent 79px, rgba(180,150,80,0.04) 79px, rgba(180,150,80,0.04) 80px);
  opacity: 0.5;
}

/* ===== 尘埃粒子 ===== */
.hero-dust {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.hero-dust span {
  position: absolute;
  border-radius: 50%;
  animation: dustFloat linear infinite;
}
@keyframes dustFloat {
  0% { transform: translateY(0) translateX(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 0.3; }
  100% { transform: translateY(80vh) translateX(60px); opacity: 0; }
}

.hero-content {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 2rem;
}

.hero-logo {
  font-family: var(--font-title);
  font-size: clamp(4rem, 12vw, 10rem);
  line-height: 0.85;
  letter-spacing: 0.05em;
  color: var(--text-primary);
  text-shadow: 0 0 40px rgba(230,57,70,0.5);
  animation: logoReveal 1.2s ease-out forwards;
  opacity: 0;
  transform: scale(0.8);
}
.hero-logo span {
  color: var(--red);
  display: inline-block;
  animation: logoPulse 3s ease-in-out infinite 1.5s;
}

@keyframes logoReveal {
  0% { opacity: 0; transform: scale(0.8); letter-spacing: 0.3em; }
  100% { opacity: 1; transform: scale(1); letter-spacing: 0.05em; }
}
@keyframes logoPulse {
  0%, 100% { text-shadow: 0 0 40px rgba(230,57,70,0.5); }
  50% { text-shadow: 0 0 80px rgba(230,57,70,0.8), 0 0 120px rgba(230,57,70,0.3); }
}

.hero-subtitle {
  font-family: var(--font-sub);
  font-size: clamp(1rem, 2.5vw, 2rem);
  letter-spacing: 0.3em;
  color: var(--text-secondary);
  margin-top: 1.5rem;
  font-weight: 400;
  animation: fadeUp 1s ease-out 0.6s forwards;
  opacity: 0;
  transform: translateY(20px);
}
.hero-title-cn {
  font-family: var(--font-body);
  font-size: clamp(1.2rem, 2.8vw, 2.2rem);
  font-weight: 700;
  color: var(--text-primary);
  margin-top: 0.5rem;
  letter-spacing: 0.15em;
  animation: fadeUp 1s ease-out 0.8s forwards;
  opacity: 0;
  transform: translateY(20px);
}

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

.hero-scroll {
  position: absolute;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  color: var(--text-dim);
  font-family: var(--font-sub);
  font-size: 0.8rem;
  letter-spacing: 0.15em;
  animation: fadeUp 1s ease-out 1.5s forwards;
  opacity: 0;
}
.hero-scroll .scroll-line {
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, var(--text-dim), transparent);
  animation: scrollPulse 2s ease-in-out infinite;
}
@keyframes scrollPulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* ===== 选人殿堂区 ===== */
.roster-section {
  padding: 4rem 1.5rem 6rem;
  max-width: 1400px;
  margin: 0 auto;
}

.section-header {
  text-align: center;
  margin-bottom: 3rem;
  position: relative;
}
.section-header h2 {
  font-family: var(--font-title);
  font-size: clamp(2.5rem, 5vw, 4rem);
  letter-spacing: 0.1em;
  color: var(--text-primary);
}
.section-header h2 span {
  color: var(--red);
}
.section-header::after {
  content: '';
  display: block;
  width: 80px;
  height: 4px;
  background: var(--red);
  margin: 1rem auto 0;
}
.section-header p {
  color: var(--text-secondary);
  margin-top: 0.8rem;
  font-size: 0.95rem;
  letter-spacing: 0.1em;
}

/* ===== 3D 旋转木马 ===== */
.carousel-stage {
  position: relative;
  height: 520px;
  perspective: 1700px;
  overflow: visible;
  display: flex;
  align-items: center;
  justify-content: center;
}
.carousel-container {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transform: rotateY(0deg);
}
.carousel-card {
  position: absolute;
  width: 150px;
  height: 225px;
  left: calc(50% - 75px);
  top: calc(50% - 112.5px);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  will-change: transform;
  cursor: pointer;
  background: transparent;
  border: none;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.card-body {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: var(--bg-card);
  border: 2px solid var(--border-color);
  border-radius: 4px;
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease, border-color 0.3s;
  position: relative;
  z-index: 1;
}
.carousel-card:hover .card-body {
  transform: scale(1.5);
  border-color: var(--neon-cyan);
  box-shadow: 0 0 40px rgba(0,229,255,0.5), 0 0 80px rgba(0,229,255,0.2);
  z-index: 200;
}
.carousel-card.dimmed .card-body {
  opacity: 0.35;
  filter: brightness(0.5);
  transition: opacity 0.4s ease, filter 0.4s ease;
}
.carousel-card .avatar {
  width: 100%;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.carousel-card .avatar .bg-splash {
  position: absolute;
  inset: 0;
  transition: transform 0.4s;
}
.card-portrait {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  z-index: 1;
}
.carousel-card .info {
  width: 100%;
  padding: 0.5rem 0.4rem 0.4rem;
  background: rgba(0,0,0,0.6);
  border-top: 1px solid var(--border-color);
  text-align: center;
}
.carousel-card .info .name-en {
  font-family: var(--font-sub);
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  line-height: 1.2;
}
.carousel-card .info .name-cn {
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.1em;
  margin-top: 0.1rem;
}
.carousel-card.front .card-body {
  border-color: var(--neon-cyan);
  box-shadow: 0 0 20px rgba(0,229,255,0.4), 0 0 60px rgba(0,229,255,0.15), inset 0 0 20px rgba(0,229,255,0.1);
  z-index: 10;
}
.carousel-card.front .name-en {
  color: var(--neon-cyan);
}
.carousel-stage.dragging {
  cursor: grabbing;
}
.carousel-stage:not(.dragging) .carousel-container {
  cursor: grab;
}
.carousel-stage.dragging * {
  user-select: none;
  -webkit-user-select: none;
}
.carousel-card.selected .card-body {
  border-color: var(--red);
  box-shadow: 0 0 30px rgba(230,57,70,0.4), inset 0 0 20px rgba(230,57,70,0.15);
}


/* ===== 详情弹窗 ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  opacity: 0;
  transition: opacity 0.35s ease;
}
.modal-overlay.active {
  display: flex;
  opacity: 1;
}

.modal {
  position: relative;
  width: 100%;
  max-width: 900px;
  max-height: 85vh;
  background: var(--bg-dark);
  border: 1px solid var(--border-color);
  overflow-y: auto;
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  transform: scale(0.9) translateY(20px);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
}
.modal-overlay.active .modal {
  transform: scale(1) translateY(0);
}

.modal-close {
  position: absolute;
  top: 0.8rem;
  right: 0.8rem;
  width: 36px;
  height: 36px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: var(--text-primary);
  font-size: 1.2rem;
  cursor: pointer;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, transform 0.2s;
  font-family: var(--font-body);
}
.modal-close:hover {
  background: var(--red);
  border-color: var(--red);
  transform: rotate(90deg);
}

.modal-avatar {
  position: relative;
  min-height: 350px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.modal-avatar .bg-splash {
  position: absolute;
  inset: 0;
}
.modal-portrait {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  z-index: 1;
}
.modal-avatar .modal-name-tag {
  position: absolute;
  bottom: 1rem;
  left: 1rem;
  z-index: 2;
}
.modal-avatar .modal-name-tag .tag-en {
  font-family: var(--font-title);
  font-size: 2rem;
  letter-spacing: 0.05em;
  color: var(--text-primary);
  line-height: 1;
  text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}
.modal-avatar .modal-name-tag .tag-cn {
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 300;
  color: var(--text-secondary);
  letter-spacing: 0.1em;
}

.modal-info {
  padding: 2rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  border-left: 1px solid var(--border-color);
}

.modal-info .quote-block {
  font-style: italic;
  color: var(--yellow);
  font-size: 1rem;
  line-height: 1.6;
  padding: 0.8rem 1rem;
  background: rgba(244,162,97,0.1);
  border-left: 3px solid var(--yellow);
  font-family: var(--font-body);
  font-weight: 400;
}

.modal-info .section-title {
  font-family: var(--font-sub);
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--red);
  text-transform: uppercase;
  margin-top: 0.5rem;
  padding-bottom: 0.3rem;
  border-bottom: 1px solid var(--border-color);
}

.modal-info .story-text {
  font-size: 0.9rem;
  line-height: 1.8;
  color: var(--text-secondary);
  font-weight: 300;
}

.modal-info .stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.4rem 1.5rem;
}
.modal-info .stat-item {
  display: flex;
  justify-content: space-between;
  font-size: 0.8rem;
  padding: 0.25rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.modal-info .stat-item .stat-label {
  color: var(--text-dim);
  font-weight: 300;
}
.modal-info .stat-item .stat-value {
  color: var(--text-primary);
  font-weight: 500;
}

.modal-info .moves-list {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}
.modal-info .moves-list .move-tag {
  padding: 0.3rem 0.8rem;
  border: 1px solid var(--border-color);
  font-size: 0.8rem;
  color: var(--text-secondary);
  font-family: var(--font-body);
  transition: border-color 0.2s, color 0.2s;
}
.modal-info .moves-list .move-tag:hover {
  border-color: var(--neon-blue);
  color: var(--neon-blue);
}

.modal-info .style-desc {
  font-size: 0.85rem;
  line-height: 1.7;
  color: var(--text-secondary);
  font-weight: 300;
}

/* ===== 页脚 ===== */
.footer {
  text-align: center;
  padding: 3rem 1.5rem;
  border-top: 1px solid var(--border-color);
  margin-top: 2rem;
}
.footer p {
  color: var(--text-dim);
  font-size: 0.8rem;
  line-height: 1.8;
  letter-spacing: 0.05em;
}
.footer .footer-heart {
  color: var(--red);
}

/* ===== 滚动条 ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--border-color); }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* ===== 响应式 ===== */
@media (max-width: 768px) {
  .roster-section {
    padding: 2.5rem 1rem 4rem;
  }
  .carousel-stage {
    height: 380px;
    perspective: 1500px;
  }
  .carousel-card {
    width: 120px;
    height: 180px;
    left: calc(50% - 60px);
    top: calc(50% - 90px);
  }
  .carousel-card .info .name-en { font-size: 0.6rem; }
  .carousel-card .info .name-cn { font-size: 0.7rem; }
  .modal-overlay {
    padding: 0;
  }
  .modal {
    grid-template-columns: 1fr;
    max-height: 100vh;
    max-width: 100%;
    width: 100%;
    height: 100vh;
    border: none;
    border-radius: 0;
    position: fixed;
    top: 0;
    left: 0;
  }
  .modal-avatar {
    min-height: 140px;
  }
  .modal-avatar .modal-name-tag .tag-en { font-size: 1.5rem; }
  .modal-info { padding: 1rem; }
  .modal-info .stats-grid { grid-template-columns: 1fr; }
    .silhouette:hover {
    animation: silhouetteBreath var(--breath-dur, 7s) ease-in-out var(--breath-delay, 0s) infinite !important;
    transform: none !important;
    opacity: var(--opacity, 0.35) !important;
    filter: brightness(0.4) sepia(0.35) saturate(0.5) contrast(1.2) !important;
  }
  .carousel-card:hover .card-body {
    transform: none !important;
    border-color: var(--border-color) !important;
    box-shadow: none !important;
  }
  .silhouette.active {
    animation: none !important;
    transform: scale(1.08) !important;
    opacity: 1 !important;
    z-index: 10;
    filter: brightness(1) sepia(0) saturate(1) contrast(1) !important;
  }
  .carousel-card.dimmed .card-body {
    opacity: 1 !important;
    filter: none !important;
  }
}

@media (max-width: 480px) {
  .carousel-stage {
    height: 300px;
    perspective: 1350px;
  }
  .carousel-card {
    width: 90px;
    height: 135px;
    left: calc(50% - 45px);
    top: calc(50% - 67.5px);
  }
  .carousel-card .info { padding: 0.3rem 0.2rem; }
  .carousel-card .info .name-en { font-size: 0.5rem; }
  .carousel-card .info .name-cn { font-size: 0.55rem; }
  .modal-overlay { padding: 0; }
  .modal-avatar { min-height: 160px; }
  .modal-info .quote-block { font-size: 0.85rem; padding: 0.6rem; }
  }

@media (max-width: 360px) {
  .carousel-stage {
    height: 260px;
    perspective: 1200px;

// ===== 3D 旋转木马 =====
const stage = document.getElementById('carouselStage');
const container = document.getElementById('carouselContainer');
const overlay = document.getElementById('modalOverlay');
const closeBtn = document.getElementById('modalClose');
const modalAvatar = document.getElementById('modalAvatar');
const modalBgSplash = modalAvatar.querySelector('.bg-splash');
const modalNameEn = modalAvatar.querySelector('.tag-en');
const modalNameCn = modalAvatar.querySelector('.tag-cn');
const modalQuote = document.querySelector('.quote-block');
const modalStory = document.getElementById('modalStory');
const modalStyle = document.getElementById('modalStyle');
const modalMoves = document.getElementById('modalMoves');
const modalStats = document.getElementById('modalStats');

const cardAngle = 360 / fighters.length;
let currentAngle = 0;
let isDragging = false;
let isSnapping = false;
let startX = 0;
let startY = 0;
let lastX = 0;
let dragStartX = 0;
let velocityHistory = [];
let animationFrame = null;
let autoRotateTimer = null;
let isHovering = false;
let idleTimer = null;
const AUTO_ROTATE_IDLE = 3000; // ms before auto-rotate resumes after interaction
function getAutoRotateSpeed() { return window.innerWidth <= 768 ? 0.12 : 0.3; }

function getRadius() {
  const w = window.innerWidth;
  if (w <= 360) return 360;
  if (w <= 480) return 440;
  if (w <= 768) return 580;
  return 720;
}

function initCarousel() {
  fighters.forEach((fighter, i) => {
    const card = document.createElement('div');
    card.className = 'carousel-card';
    card.dataset.index = i;
    const angle = i * cardAngle;
    card.style.transform = `rotateY(${angle}deg) translateZ(${getRadius()}px)`;

    const body = document.createElement('div');
    body.className = 'card-body';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    const splash = document.createElement('div');
    splash.className = 'bg-splash';
    splash.style.background = `radial-gradient(circle at 50% 60%, ${fighter.color}44 0%, ${fighter.color}22 50%, transparent 80%)`;
    avatar.appendChild(splash);
    const img = document.createElement('img');
    img.className = 'card-portrait';
    img.src = `${fighter.image}`;
    img.alt = `${fighter.name} - ${fighter.nameZh}`;
    img.loading = 'lazy';
    avatar.appendChild(img);
    body.appendChild(avatar);

    const info = document.createElement('div');
    info.className = 'info';
    info.innerHTML = `
      <div class="name-en">${fighter.name}</div>
      <div class="name-cn">${fighter.nameZh}</div>
    `;
    body.appendChild(info);
    card.appendChild(body);

    card.addEventListener('click', () => {
      if (Math.abs(lastX - dragStartX) < 5) openModal(i);
    });
    if (window.matchMedia('(min-width: 769px)').matches) {
      card.addEventListener('mouseenter', () => {
        isHovering = true;
        stopAutoRotate();
        if (idleTimer) clearTimeout(idleTimer);
        container.querySelectorAll('.carousel-card').forEach(c => {
          if (c !== card) c.classList.add('dimmed');
        });
      });
      card.addEventListener('mouseleave', () => {
        isHovering = false;
        container.querySelectorAll('.carousel-card').forEach(c => {
          c.classList.remove('dimmed');
        });
        if (!isDragging && !isSnapping) scheduleAutoRotate();
      });
    }
    container.appendChild(card);
  });
  updateFrontCard();
}

function renderCarousel() {
  const radius = getRadius();
  container.querySelectorAll('.carousel-card').forEach((card, i) => {
    const angle = i * cardAngle;
    card.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;
  });
  container.style.transform = `rotateY(${currentAngle}deg)`;
  updateFrontCard();
}

function updateFrontCard() {
  const normalized = ((currentAngle % 360) + 360) % 360;
  const cards = container.querySelectorAll('.carousel-card');
  cards.forEach((card, i) => {
    const cardPos = ((i * cardAngle + normalized) % 360 + 540) % 360 - 180;
    const dist = Math.abs(cardPos);
    card.style.zIndex = Math.round((1 - dist / 180) * 50);
    const isFront = dist < cardAngle / 2;
    card.classList.toggle('front', isFront);
  });
}

function onPointerDown(e) {
  if (isSnapping) return;
  isDragging = true;
  stopAutoRotate();
  const clientX = e.clientX || (e.touches && e.touches[0].clientX);
  const clientY = e.clientY || (e.touches && e.touches[0].clientY);
  startX = lastX = dragStartX = clientX;
  startY = clientY;
  velocityHistory = [];
  stage.classList.add('dragging');
  if (animationFrame) cancelAnimationFrame(animationFrame);
  e.preventDefault();
}

function onPointerMove(e) {
  if (!isDragging) return;
  const clientX = e.clientX || (e.touches && e.touches[0].clientX);
  if (!clientX) return;

  if (e.type === 'touchmove') {
    const touch = e.touches[0];
    const clientY = touch.clientY;
    const deltaX = Math.abs(clientX - startX);
    const deltaY = Math.abs(clientY - startY);
    if (deltaY > deltaX && deltaY > 10) {
      isDragging = false;
      stage.classList.remove('dragging');
      return;
    }
    e.preventDefault();
  }

  const deltaX = clientX - lastX;
  lastX = clientX;
  const dragSensitivity = window.innerWidth <= 768 ? 0.2 : 0.4;
  currentAngle += deltaX * dragSensitivity;
  renderCarousel();

  const now = Date.now();
  velocityHistory.push({ x: clientX, time: now });
  if (velocityHistory.length > 5) velocityHistory.shift();
}

function onPointerUp(e) {
  if (!isDragging) return;
  isDragging = false;
  stage.classList.remove('dragging');

  // 触屏设备：detect 点击（非拖拽），直接打开当前正面角色的弹窗
  // 因为 onPointerDown 中 preventDefault 会抑制 click 事件派发
  if (e && e.changedTouches) {
    const isTap = Math.abs(lastX - dragStartX) < 5;
    if (isTap) {
      const frontCard = container.querySelector('.carousel-card.front');
      if (frontCard) {
        const index = parseInt(frontCard.dataset.index);
        if (!isNaN(index)) openModal(index);
      }
      return;
    }
  }

  let velocity = 0;
  if (velocityHistory.length >= 2) {
    const first = velocityHistory[0];
    const last = velocityHistory[velocityHistory.length - 1];
    const dt = (last.time - first.time) / 1000;
    if (dt > 0) velocity = (last.x - first.x) / dt * 0.4;
  }

  if (Math.abs(velocity) > 30) {
    const target = currentAngle + Math.sign(velocity) * Math.min(Math.abs(velocity) * 0.15, 360);
    animateToAngle(target, Math.min(600 + Math.abs(velocity) * 2, 1200));
  } else {
    snapToNearest();
  }
}

function snapToNearest() {
  const nearest = Math.round(currentAngle / cardAngle) * cardAngle;
  animateToAngle(nearest, 500);
}

function animateToAngle(target, duration) {
  isSnapping = true;
  const start = currentAngle;
  const startTime = performance.now();

  function tick(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3);
    currentAngle = start + (target - start) * eased;
    renderCarousel();
    if (t < 1) {
      animationFrame = requestAnimationFrame(tick);
    } else {
      currentAngle = target;
      renderCarousel();
      isSnapping = false;
      scheduleAutoRotate();
    }
  }

  if (animationFrame) cancelAnimationFrame(animationFrame);
  animationFrame = requestAnimationFrame(tick);
}

// ===== 自动旋转 =====
function startAutoRotate() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  stopAutoRotate();
  let lastTime = performance.now();

  function tick(now) {
    if (isHovering || isDragging || isSnapping) {
      autoRotateTimer = requestAnimationFrame(tick);
      return;
    }
    const dt = Math.min(now - lastTime, 50);
    lastTime = now;
    currentAngle -= getAutoRotateSpeed() * (dt / 16.67);
    renderCarousel();
    autoRotateTimer = requestAnimationFrame(tick);
  }
  autoRotateTimer = requestAnimationFrame(tick);
}

function stopAutoRotate() {
  if (autoRotateTimer) {
    cancelAnimationFrame(autoRotateTimer);
    autoRotateTimer = null;
  }
}

function scheduleAutoRotate() {
  if (idleTimer) clearTimeout(idleTimer);
  if (isHovering || isDragging) return;
  idleTimer = setTimeout(startAutoRotate, AUTO_ROTATE_IDLE);
}

// ===== 鼠标滚轮 =====
function onWheel(e) {
  e.preventDefault();
  stopAutoRotate();
  currentAngle += e.deltaY > 0 ? -12 : 12;
  renderCarousel();

  if (idleTimer) clearTimeout(idleTimer);
  idleTimer = setTimeout(() => {
    if (!isHovering) snapToNearest();
  }, 600);
}

// 事件绑定
stage.addEventListener('mousedown', onPointerDown);
document.addEventListener('mousemove', onPointerMove);
document.addEventListener('mouseup', onPointerUp);
stage.addEventListener('touchstart', onPointerDown, { passive: false });
document.addEventListener('touchmove', onPointerMove, { passive: false });
document.addEventListener('touchend', onPointerUp, { passive: true });
stage.addEventListener('contextmenu', (e) => e.preventDefault());
window.addEventListener('resize', () => renderCarousel());

// 鼠标滚轮
if (window.matchMedia('(min-width: 769px)').matches) {
  stage.addEventListener('wheel', onWheel, { passive: false });
}

// 初始化
initCarousel();
renderCarousel();
currentAngle = 15;
snapToNearest();
setTimeout(() => startAutoRotate(), 800);

// ===== 弹窗 =====
function openModal(index) {
  const f = fighters[index];
  modalBgSplash.style.background = `radial-gradient(circle at 50% 50%, ${f.color}33 0%, ${f.color}11 50%, transparent 80%)`;
  modalNameEn.textContent = f.name;
  modalNameCn.textContent = f.nameZh;

  // 设置角色立绘
  let modalPortrait = modalAvatar.querySelector('.modal-portrait');
  if (!modalPortrait) {
    modalPortrait = document.createElement('img');
    modalPortrait.className = 'modal-portrait';
    modalAvatar.appendChild(modalPortrait);
  }
  modalPortrait.src = `${f.image}`;
  modalPortrait.alt = f.name;
  modalQuote.textContent = f.quote;
  modalStory.textContent = f.backStory;
  modalStyle.textContent = f.fightingStyleDesc;

  modalMoves.innerHTML = '';
  f.classicMoves.forEach(move => {
    const tag = document.createElement('span');
    tag.className = 'move-tag';
    tag.textContent = move;
    modalMoves.appendChild(tag);
  });

  modalStats.innerHTML = `
    <div class="stat-item"><span class="stat-label">国籍</span><span class="stat-value">${f.country}</span></div>
    <div class="stat-item"><span class="stat-label">格斗风格</span><span class="stat-value">${f.fightingStyle}</span></div>
    <div class="stat-item"><span class="stat-label">身高</span><span class="stat-value">${f.height}</span></div>
    <div class="stat-item"><span class="stat-label">体重</span><span class="stat-value">${f.weight}</span></div>
    <div class="stat-item"><span class="stat-label">初登场</span><span class="stat-value">${f.firstAppearance}</span></div>
    <div class="stat-item"><span class="stat-label">声优</span><span class="stat-value">${f.voiceActor}</span></div>
  `;

  container.querySelectorAll('.carousel-card').forEach(c => c.classList.remove('selected'));
  container.querySelector(`[data-index="${index}"]`)?.classList.add('selected');

  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlay.classList.remove('active');
  document.body.style.overflow = '';
  container.querySelectorAll('.carousel-card').forEach(c => c.classList.remove('selected'));
}

closeBtn.addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// === 禁用移动端缩放 ===
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());
let lastTouchEnd = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) e.preventDefault();
  lastTouchEnd = now;
}, false);

    const x = parseFloat(attr.match(/--x:\s*([\d.]+)%/)?.[1]) || 50;
    const y = parseFloat(attr.match(/--y:\s*([\d.]+)%/)?.[1]) || 50;
    data.push({ el: s, size, x, y });
  });

  function layout() {
    const mobile = window.innerWidth <= 768;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const margin = 16;

    if (!mobile) {
      data.forEach(({ el, size, x, y }) => {
        el.style.setProperty('--size', size);
        el.style.setProperty('--x', x + '%');
        el.style.setProperty('--y', y + '%');
      });
      return;
    }

    // 统一缩放：最大角色高度 ≤ 35vh，宽度 ≤ 40vw
    const maxOrig = Math.max(...data.map(d => d.size));
    const scale = Math.min(
      vh * 0.35 / maxOrig,
      vw * 0.4 / (maxOrig * 0.5),
      1
    );

    data.forEach(({ el, size: os, x: ox, y: oy }) => {
      const sz = os * scale;

      // x: 将 [0,100] 映射到 [10,90]，再进行像素级 clamp
      let nx = 10 + (ox / 100) * 80;
      const minX = (margin + sz * 0.25) / vw * 100;
      const maxX = (vw - margin - sz * 0.25) / vw * 100;
      if (minX < maxX) nx = Math.max(minX, Math.min(maxX, nx));
      else nx = 50; // 屏幕过窄时居中

      // y: 将 [0,100] 映射到 [15,85]，再进行像素级 clamp
      let ny = 15 + (oy / 100) * 70;
      const minY = (margin + sz * 0.5) / vh * 100;
      const maxY = (vh - margin - sz * 0.5) / vh * 100;
      if (minY < maxY) ny = Math.max(minY, Math.min(maxY, ny));
      else ny = 50;

      el.style.setProperty('--size', sz);
      el.style.setProperty('--x', nx + '%');
      el.style.setProperty('--y', ny + '%');
    });
  }

  layout();
  let timer;
  window.addEventListener('resize', () => {
    clearTimeout(timer);
    timer = setTimeout(layout, 100);
  });
})();

// ===== 剪影点击高亮切换（移动端 tap 停留）=====
document.querySelectorAll('.silhouette').forEach(s => {
  s.addEventListener('click', function(e) {
    e.stopPropagation();
    document.querySelectorAll('.silhouette').forEach(el => el.classList.remove('active'));
    this.classList.add('active');
  });
});

console.log('🎮 斗士殿堂已加载！共 ' + fighters.length + ' 位斗士等待你的选择。');
